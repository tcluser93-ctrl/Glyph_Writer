[versions]
agp = "9.2.0"
commons-lang = "3.20.0"
documentfile = "1.1.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.13.0"
activity = "1.13.0"
constraintlayout = "2.2.1"
gridlayout = "1.1.0"
signprovider = "1.0.2"
thoth = "2.0.4"
glyphconverter = "1.7.0"
