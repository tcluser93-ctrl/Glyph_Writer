name: Android CI Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install platforms
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Ensure gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare local THOTH AAR fallback
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="$GITHUB_WORKSPACE/../../THOTExpampleApp/thoth/build/outputs/aar"
          mkdir -p "$TARGET_DIR"
          if [ ! -f "$TARGET_DIR/thoth-debug.aar" ]; then
            echo "Creating empty fallback AAR at $TARGET_DIR/thoth-debug.aar"
            TMP_DIR=$(mktemp -d)
            mkdir -p "$TMP_DIR/empty"
            (cd "$TMP_DIR/empty" && zip -qr "$TARGET_DIR/thoth-debug.aar" .)
          fi
          ls -lah "$TARGET_DIR"

      - name: Gradle clean
        run: ./gradlew --no-daemon clean

      - name: Assemble debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Assemble release APK
        run: ./gradlew --no-daemon assembleRelease
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: egyptian-writer-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK if present
        uses: actions/upload-artifact@v4
        with:
          name: egyptian-writer-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            app/build/reports/**
            build/reports/**
          if-no-files-found: ignore
