name: Unit Tests

on:
  workflow_dispatch:

permissions:
  contents: read
  checks:   write

jobs:
  unit-test:
    name: JVM Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install platform 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Ensure gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare THOTH AAR stub
        run: |
          set -euo pipefail
          TARGET="$GITHUB_WORKSPACE/../../THOTExpampleApp/thoth/build/outputs/aar"
          mkdir -p "$TARGET"
          if [ ! -f "$TARGET/thoth-debug.aar" ]; then
            TMP=$(mktemp -d)
            mkdir -p "$TMP/empty"
            touch "$TMP/empty/.keep"
            (cd "$TMP/empty" && zip -qr "$TARGET/thoth-debug.aar" .)
          fi

      # ── Esegui i test JVM — senza continue-on-error per vedere il log Gradle ──
      - name: Run unit tests
        id: run_tests
        run: |
          ./gradlew --no-daemon --stacktrace \
            :app:testDebugUnitTest \
            --tests "com.blueapps.egyptianwriter.bliss.*" \
            2>&1 | tee gradle-test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload XML test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: app/build/test-results/**/*.xml
          if-no-files-found: warn

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn

      - name: Upload raw Gradle output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-output
          path: gradle-test-output.txt
          if-no-files-found: warn

      - name: Publish test report (Checks)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name:          "Bliss Unit Tests"
          path:          "app/build/test-results/**/*.xml"
          reporter:      java-junit
          fail-on-error: true
          fail-on-empty: false

      - name: Generate Job Summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import os, glob, xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          files = glob.glob("app/build/test-results/**/*.xml", recursive=True)

          total = passed = failed = skipped = 0
          duration = 0.0
          suites = []

          for f in sorted(files):
              try:
                  root = ET.parse(f).getroot()
                  tss = list(root) if root.tag == "testsuites" else [root]
                  for ts in tss:
                      t  = int(ts.get("tests",    0))
                      fa = int(ts.get("failures", 0))
                      sk = int(ts.get("skipped",  0))
                      er = int(ts.get("errors",   0))
                      tm = float(ts.get("time",   0))
                      total    += t
                      failed   += fa + er
                      skipped  += sk
                      passed   += t - fa - sk - er
                      duration += tm

                      cases = []
                      for tc in ts.findall("testcase"):
                          name  = tc.get("name", "?")
                          cls   = tc.get("classname", "").split(".")[-1]
                          t_ms  = round(float(tc.get("time", 0)) * 1000)
                          fail  = tc.find("failure")
                          err   = tc.find("error")
                          skip  = tc.find("skipped")
                          if fail is not None or err is not None:
                              status = "❌"
                              msg    = (fail or err).get("message", "")[:140]
                          elif skip is not None:
                              status = "⏭️"
                              msg    = ""
                          else:
                              status = "✅"
                              msg    = ""
                          cases.append((status, cls, name, t_ms, msg))

                      suites.append((ts.get("name",""), t, fa+er, sk, tm, cases))
              except Exception:
                  pass

          overall = "✅ PASSED" if failed == 0 and total > 0 else \
                    "❌ FAILED" if failed > 0 else \
                    "⚠️ NO RESULTS"
          md  = f"# 🧪 Unit Test Report — {overall}\n\n"
          md += f"> Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}  \n"
          md += f"> Scope: `com.blueapps.egyptianwriter.bliss.*`\n\n"
          md += "## Summary\n\n"
          md += "| 🔢 Total | ✅ Passed | ❌ Failed | ⏭️ Skipped | ⏱️ Duration |\n"
          md += "|--------:|--------:|--------:|---------:|----------:|\n"
          md += f"| {total} | {passed} | {failed} | {skipped} | {duration:.2f}s |\n\n"

          if suites:
              md += "## Test Suites\n\n"
              for (sname, st, sf, ss, stm, cases) in suites:
                  icon = "✅" if sf == 0 else "❌"
                  ok   = st - sf - ss
                  md += f"<details>\n<summary>{icon} <b>{sname}</b>"
                  md += f" &mdash; {ok}/{st} passed ({stm:.2f}s)</summary>\n\n"
                  md += "| Status | Class | Test | ms |\n"
                  md += "|:------:|-------|------|---------:|\n"
                  for (status, cls, name, t_ms, msg) in cases:
                      md += f"| {status} | `{cls}` | {name} | {t_ms} |\n"
                      if msg:
                          md += f"\n> ⚠️ `{msg}`\n\n"
                  md += "\n</details>\n\n"

          if total == 0:
              # Allega anche le ultime 50 righe del log Gradle
              gradle_log = ""
              try:
                  with open("gradle-test-output.txt") as gf:
                      lines = gf.readlines()
                      gradle_log = "".join(lines[-50:])
              except Exception:
                  gradle_log = "(file non trovato)"
              md += "> ⚠️ Nessun risultato XML trovato — il build Gradle è probabilmente fallito.\n\n"
              md += "<details>\n<summary>🔍 Ultime 50 righe del log Gradle</summary>\n\n"
              md += f"```\n{gradle_log}\n```\n\n</details>\n"

          out = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(out, "w") as fh:
              fh.write(md)

          print(f"Summary written — {total} tests | {passed} passed | {failed} failed")
          PYEOF

      - name: Fail if tests failed or did not run
        if: always()
        run: |
          # Conta i file XML prodotti
          XML_COUNT=$(find app/build/test-results -name "*.xml" 2>/dev/null | wc -l)
          if [ "$XML_COUNT" -eq 0 ]; then
            echo "❌ Nessun XML trovato — testDebugUnitTest non ha prodotto risultati (build fallito?)."
            echo "--- Ultime 80 righe Gradle ---"
            tail -80 gradle-test-output.txt 2>/dev/null || echo "(gradle-test-output.txt non disponibile)"
            exit 1
          fi
          # Conta i failure nei file XML
          FAIL_COUNT=$(grep -rl '<failure\|<error' app/build/test-results/ 2>/dev/null | wc -l)
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "❌ Unit tests failed. See the Job Summary and HTML report above."
            exit 1
          fi
          echo "✅ All tests passed."
