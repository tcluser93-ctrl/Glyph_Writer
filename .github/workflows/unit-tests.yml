name: Unit Tests

# ────────────────────────────────────────────────────────────────────────────
# Triggers
#   • Ogni push su main / feature/* / fix/* che tocca codice o build files
#   • Ogni Pull Request verso main
#   • Esecuzione manuale dalla tab Actions
# ────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main", "feature/**", "fix/**" ]
    paths:
      - "app/src/**"
      - "app/build.gradle.kts"
      - "gradle/libs.versions.toml"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  checks:   write   # necessario per dorny/test-reporter

jobs:
  unit-test:
    name: JVM Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # ── 3. Android SDK (necessario per compilare il modulo :app) ─────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install platform 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      # ── 4. Gradlew permissions ───────────────────────────────────────────────
      - name: Ensure gradlew executable
        run: chmod +x ./gradlew

      # ── 5. AAR stub (dipendenza locale thoth) ────────────────────────────────
      - name: Prepare THOTH AAR stub
        run: |
          set -euo pipefail
          TARGET="$GITHUB_WORKSPACE/../../THOTExpampleApp/thoth/build/outputs/aar"
          mkdir -p "$TARGET"
          if [ ! -f "$TARGET/thoth-debug.aar" ]; then
            TMP=$(mktemp -d)
            mkdir -p "$TMP/empty"
            (cd "$TMP/empty" && zip -qr "$TARGET/thoth-debug.aar" .)
          fi

      # ── 6. Esegui i test JVM ─────────────────────────────────────────────────
      #    continue-on-error: true → raccoglie report anche in caso di failure;
      #    il job viene comunque marcato ✗ dallo step finale.
      - name: Run unit tests
        id: run_tests
        continue-on-error: true
        run: |
          ./gradlew --no-daemon \
            :app:testDebugUnitTest \
            --tests "com.blueapps.egyptianwriter.bliss.*"

      # ── 7. Upload XML (fonte per step 9 e 10) ───────────────────────────────
      - name: Upload XML test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: app/build/test-results/**/*.xml
          if-no-files-found: warn

      # ── 8. Upload report HTML (apribile nel browser) ─────────────────────────
      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn

      # ── 9. Pubblica come GitHub Checks annotation ────────────────────────────
      #    Ogni test appare pass/fail direttamente nella tab "Checks" della PR.
      - name: Publish test report (Checks)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name:          "Bliss Unit Tests"
          path:          "app/build/test-results/**/*.xml"
          reporter:      java-junit
          fail-on-error: true
          fail-on-empty: false

      # ── 10. Job Summary human-readable ───────────────────────────────────────
      #    Riepilogo Markdown visibile cliccando il run nella tab Actions.
      #    Formato: KPI table + <details> collassabili per ogni suite.
      - name: Generate Job Summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import os, glob, xml.etree.ElementTree as ET
          from datetime import datetime

          files = glob.glob("app/build/test-results/**/*.xml", recursive=True)

          total = passed = failed = skipped = 0
          duration = 0.0
          suites = []

          for f in sorted(files):
              try:
                  root = ET.parse(f).getroot()
                  tss = list(root) if root.tag == "testsuites" else [root]
                  for ts in tss:
                      t  = int(ts.get("tests",    0))
                      fa = int(ts.get("failures", 0))
                      sk = int(ts.get("skipped",  0))
                      er = int(ts.get("errors",   0))
                      tm = float(ts.get("time",   0))
                      total    += t
                      failed   += fa + er
                      skipped  += sk
                      passed   += t - fa - sk - er
                      duration += tm

                      cases = []
                      for tc in ts.findall("testcase"):
                          name  = tc.get("name", "?")
                          cls   = tc.get("classname", "").split(".")[-1]
                          t_ms  = round(float(tc.get("time", 0)) * 1000)
                          fail  = tc.find("failure")
                          err   = tc.find("error")
                          skip  = tc.find("skipped")
                          if fail is not None or err is not None:
                              status = "❌"
                              msg    = (fail or err).get("message", "")[:140]
                          elif skip is not None:
                              status = "⏭️"
                              msg    = ""
                          else:
                              status = "✅"
                              msg    = ""
                          cases.append((status, cls, name, t_ms, msg))

                      suites.append((ts.get("name",""), t, fa+er, sk, tm, cases))
              except Exception:
                  pass

          # ── header ────────────────────────────────────────────────────────────
          overall = "✅ PASSED" if failed == 0 and total > 0 else \
                    "❌ FAILED" if failed > 0 else \
                    "⚠️ NO RESULTS"
          md  = f"# 🧪 Unit Test Report — {overall}\n\n"
          md += f"> Generated: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}  \n"
          md += f"> Scope: `com.blueapps.egyptianwriter.bliss.*`\n\n"

          # ── KPI table ─────────────────────────────────────────────────────────
          md += "## Summary\n\n"
          md += "| 🔢 Total | ✅ Passed | ❌ Failed | ⏭️ Skipped | ⏱️ Duration |\n"
          md += "|--------:|--------:|--------:|---------:|----------:|\n"
          md += f"| {total} | {passed} | {failed} | {skipped} | {duration:.2f}s |\n\n"

          # ── per-suite collapsible detail ─────────────────────────────────────
          if suites:
              md += "## Test Suites\n\n"
              for (sname, st, sf, ss, stm, cases) in suites:
                  icon = "✅" if sf == 0 else "❌"
                  ok   = st - sf - ss
                  md += f"<details>\n<summary>{icon} <b>{sname}</b>"
                  md += f" &mdash; {ok}/{st} passed ({stm:.2f}s)</summary>\n\n"
                  md += "| Status | Class | Test | ms |\n"
                  md += "|:------:|-------|------|---------:|\n"
                  for (status, cls, name, t_ms, msg) in cases:
                      md += f"| {status} | `{cls}` | {name} | {t_ms} |\n"
                      if msg:
                          md += f"\n> ⚠️ `{msg}`\n\n"
                  md += "\n</details>\n\n"

          # ── no-results fallback ───────────────────────────────────────────────
          if total == 0:
              md += "> ⚠️ Nessun risultato XML trovato. "
              md += "Controlla che `testDebugUnitTest` abbia girato correttamente.\n"

          # ── write to GITHUB_STEP_SUMMARY ──────────────────────────────────────
          out = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(out, "w") as fh:
              fh.write(md)

          print(f"Summary written — {total} tests | {passed} passed | {failed} failed")
          PYEOF

      # ── 11. Fail esplicito se i test sono falliti ────────────────────────────
      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "❌ Unit tests failed. See the Job Summary and HTML report above."
          exit 1
