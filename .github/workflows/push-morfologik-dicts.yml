name: Push Morfologik Dictionaries

on:
  workflow_dispatch:

jobs:
  push-dicts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MORFOLOGIK_PUSH_PAT }}

      - name: Download IT dictionary (LT 6.5)
        run: |
          mkdir -p app/src/main/assets/morfologik
          curl -sL https://repo1.maven.org/maven2/org/languagetool/language-it/6.5/language-it-6.5.jar -o /tmp/lt-it.jar
          python3 - <<'EOF'
          import zipfile, os
          z = zipfile.ZipFile('/tmp/lt-it.jar')
          base = 'app/src/main/assets/morfologik'
          with z.open('org/languagetool/resource/it/italian.dict') as s, open(f'{base}/it.dict','wb') as d: d.write(s.read())
          with z.open('org/languagetool/resource/it/italian.info') as s, open(f'{base}/it.info','wb') as d: d.write(s.read())
          print('IT ok')
          EOF

      - name: Download EN dictionary (LT 5.9)
        run: |
          curl -sL https://repo1.maven.org/maven2/org/languagetool/language-en/5.9/language-en-5.9.jar -o /tmp/lt-en.jar
          python3 - <<'EOF'
          import zipfile
          z = zipfile.ZipFile('/tmp/lt-en.jar')
          base = 'app/src/main/assets/morfologik'
          with z.open('org/languagetool/resource/en/english.dict') as s, open(f'{base}/en.dict','wb') as d: d.write(s.read())
          with z.open('org/languagetool/resource/en/english.info') as s, open(f'{base}/en.info','wb') as d: d.write(s.read())
          print('EN ok')
          EOF

      - name: Download DE dictionary (LT 6.5)
        run: |
          curl -sL https://repo1.maven.org/maven2/org/languagetool/language-de/6.5/language-de-6.5.jar -o /tmp/lt-de.jar
          python3 - <<'EOF'
          import zipfile
          z = zipfile.ZipFile('/tmp/lt-de.jar')
          base = 'app/src/main/assets/morfologik'
          with z.open('org/languagetool/resource/de/hunspell/de_DE.dict') as s, open(f'{base}/de.dict','wb') as d: d.write(s.read())
          with z.open('org/languagetool/resource/de/hunspell/de_DE.info') as s, open(f'{base}/de.info','wb') as d: d.write(s.read())
          print('DE ok')
          EOF

      - name: Verify files
        run: |
          ls -lh app/src/main/assets/morfologik/
          python3 -c "
          import os
          for f in ['it','en','de']:
              for ext in ['dict','info']:
                  p = f'app/src/main/assets/morfologik/{f}.{ext}'
                  sz = os.path.getsize(p)
                  assert sz > 100, f'{p} too small ({sz} bytes)'
                  print(f'{p}: {sz:,} bytes OK')
          "

      - name: Commit dictionaries
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add app/src/main/assets/morfologik/
          git commit -m 'feat(nlp): add Morfologik FSA dictionaries IT/EN/DE

          Sources:
          - IT: LanguageTool 6.5 language-it jar (LGPL 2.1)
          - EN: LanguageTool 5.9 language-en jar (LGPL 2.1)
          - DE: LanguageTool 6.5 language-de jar, de_DE_frami (LGPL 2.1)

          Enables MorfologikLemmatizer tier 3c2 in BlissTranslator.translateAsync()
          Expected coverage gain: +13-23pp on IT/EN, +27pp on DE'
          git push

      - name: Delete this workflow file
        run: |
          git rm .github/workflows/push-morfologik-dicts.yml
          git commit -m 'ci: remove one-shot Morfologik download workflow'
          git push
